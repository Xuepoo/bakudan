repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
  - repo: local
    hooks:
      - id: oxlint
        name: oxlint
        entry: oxlint src/ --no-error-on-unmatched-pattern
        language: system
        types: [ts]
        pass_filenames: false
